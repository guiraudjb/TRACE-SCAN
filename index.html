<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRACE_SCAN - Inventaire Nomade</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* DESIGN ET ERGONOMIE (Respect DSFR) */
        :root {
            --blue-france: #000091; /* Boutons d'action primaire [cite: 33] */
            --grey-border: #E5E5E5; /* Bouton secondaire [cite: 35] */
            --text-color: #1e1e1e;
        }

        body {
            font-family: 'Marianne', Arial, sans-serif; /* Typographie Marianne [cite: 32] */
            margin: 0;
            background-color: #f6f6f6;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: white;
            padding: 10px 15px;
            border-bottom: 2px solid var(--blue-france);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-rf {
            height: 40px;
            border-left: 2px solid black;
            padding-left: 8px;
            font-weight: 900;
            font-size: 0.7rem;
            line-height: 1;
            text-transform: uppercase; /* Logo République Française [cite: 30] */
        }

        h1 { margin: 0; font-size: 1.1rem; flex-grow: 1; }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px; /* Interface Mobile First épurée [cite: 36] */
        }

        #reader-container {
            position: relative;
            width: 100%;
            background: black;
            border-radius: 4px;
            overflow: hidden;
            border: 3px solid transparent;
            transition: border-color 0.2s ease;
        }

        #reader-container.scan-success { border-color: #27a658; }

        #reader { width: 100%; }

        .scanner-laser {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 0, 145, 0.6);
            box-shadow: 0 0 10px 2px rgba(0, 0, 145, 0.8);
            z-index: 10;
            animation: scanning 2s infinite linear;
        }

        @keyframes scanning {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .dashboard {
            background: white;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .scan-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-family: monospace;
            font-size: 0.9rem;
            max-height: 120px;
            overflow-y: auto;
        }

        .scan-list li {
            padding: 6px 0;
            border-bottom: 1px solid var(--grey-border);
        }

        .button-group { display: flex; gap: 10px; margin-top: 12px; }

        button {
            flex: 1;
            padding: 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            border: none;
        }

        .btn-primary { background-color: var(--blue-france); color: white; }
        .btn-secondary { background-color: white; color: #666; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <header>
        <div class="logo-rf">République<br>Française</div>
        <h1>TRACE_SCAN</h1>
    </header>

    <main>
        <div id="reader-container">
            <div id="reader"></div>
            <div class="scanner-laser"></div>
        </div>
        
        <div class="dashboard">
            <div class="stats">
                <span>Compteur : <span id="total-count">0</span></span> </div>
            
            <strong>5 derniers scans :</strong> <ul class="scan-list" id="recent-scans">
                <li style="color:#999">En attente...</li>
            </ul>
            
            <div class="button-group">
                <button class="btn-secondary" onclick="annulerDernier()">Annuler dernier</button> <button class="btn-primary" onclick="terminerSession()">Terminer la session</button> </div>
        </div>
    </main>

    <script src="./html5-qrcode.min.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('Mode Offline prêt.'))
                .catch(err => console.error('Erreur PWA:', err));
        }

        let scanList = [];
        let html5QrCode;

        function onScanSuccess(decodedText) {
            if (scanList[scanList.length - 1] === decodedText) return;
            scanList.push(decodedText);
            
            const container = document.getElementById('reader-container');
            container.classList.add('scan-success');
            if (navigator.vibrate) navigator.vibrate(100);
            updateUI();
            setTimeout(() => container.classList.remove('scan-success'), 300);
        }

        function updateUI() {
            document.getElementById('total-count').innerText = scanList.length;
            const listElement = document.getElementById('recent-scans');
            listElement.innerHTML = '';
            const recent = scanList.slice(-5).reverse();
            recent.forEach((item, index) => {
                const li = document.createElement('li');
                li.textContent = item;
                listElement.appendChild(li);
            });
        }

        function annulerDernier() {
            if (scanList.length > 0) {
                scanList.pop();
                updateUI();
            }
        }

        async function terminerSession() {
            if (scanList.length === 0) return alert("Aucun scan.");

            const now = new Date();
            const dateStr = now.toISOString().split('T')[0];
            const timeStr = now.getHours().toString().padStart(2,'0') + now.getMinutes().toString().padStart(2,'0');
            const fileName = `scan_trace_${dateStr}_${timeStr}.txt`; /* Nommage YYYY-MM-DD_HHmm [cite: 23] */

            const content = scanList.join('\n');
            const file = new File([content], fileName, { type: 'text/plain;charset=utf-8' });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'Inventaire TRACE_SCAN',
                        text: 'Fichier joint pour le service.' /* Partage Android [cite: 24, 47] */
                    });
                } catch (e) { console.log("Partage annulé"); }
            } else {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(file);
                link.download = fileName;
                link.click();
            }
        }

        window.addEventListener('load', () => {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { 
                    fps: 15, 
                    qrbox: { width: 250, height: 250 },
                    // FORCE LE FORMAT QR CODE POUR LA DÉTECTION 
                    formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ] 
                },
                onScanSuccess,
                () => { /* Loop failures ignored */ }
            ).catch(err => console.error("Erreur caméra :", err));
        });
    </script>
</body>
</html>
